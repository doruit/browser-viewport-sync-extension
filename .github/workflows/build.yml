name: Build Extension

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension
      run: npm run build

    - name: Check dist folder exists
      run: test -d dist

    - name: Verify manifest.json
      run: test -f dist/manifest.json

    - name: Verify background.js
      run: test -f dist/background.js

    - name: Verify content.js
      run: test -f dist/content.js

    - name: Verify popup files
      run: |
        test -f dist/popup.html
        test -f dist/popup.js
        test -f dist/popup.css

    - name: Archive build artifacts
      if: matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: extension-build
        path: dist/
        retention-days: 7
